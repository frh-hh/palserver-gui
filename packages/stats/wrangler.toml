# palserver 匿名使用統計 Worker。部署步驟見 README.md。
name = "palserver-stats"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# GUI 下載數的來源 repo(GitHub Releases 公開統計)。
[vars]
GITHUB_REPO = "io-software-ai/palserver-gui"

# 先 `wrangler d1 create palserver-stats`,把回傳的 database_id 填進來,
# 再 `pnpm db:schema` 建表。
[[d1_databases]]
binding = "DB"
database_name = "palserver-stats"
database_id = "8491c2e2-5a2f-45f8-b542-fa287091d44c"
